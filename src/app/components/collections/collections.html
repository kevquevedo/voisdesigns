<section id="colecciones" class="section" data-screen-label="02 Colecciones">
  <header class="section__head">
    <div class="section__index">
      <span>02 —</span> <b>Colecciones</b>
    </div>
    <div class="section__meta">Tres familias / 24 piezas</div>
  </header>

  <div class="collections">
    @for (c of collections; track c.n; let i = $index) {
      <article class="collection" [class]="'collection--0' + (i + 1)" appReveal>
        <div class="collection__frame">
          <div class="ph"></div>
        </div>
        <div class="collection__meta">
          <div>
            <div class="collection__name">
              <em>{{ c.name }}</em>
            </div>
            <div class="collection__desc">{{ c.desc }}</div>
          </div>
          <div class="collection__num">{{ c.num }}</div>
        </div>
      </article>
    }
  </div>
</section>
