<section id="medida" class="relative z-[2] bg-[var(--dark)] text-[var(--bg)]
                            px-[var(--pad-x)] py-[calc(6rem*var(--density))]">

  <!-- Head: index + título -->
  <div class="mb-12 pb-10 border-b border-white/15
              grid grid-cols-1 gap-6
              md:grid-cols-[1fr_2fr] md:gap-16 md:mb-16">
    <div class="font-mono text-[0.75rem] tracking-[0.1em] uppercase opacity-60">
      <span class="mr-2">05 —</span><b>A medida</b>
    </div>
    <h2 class="font-serif font-normal m-0 leading-none
               text-[clamp(2rem,5vw,4.5rem)]" appReveal>
      Diseñamos contigo,<br />
      construimos <em>para ti</em>.
    </h2>
  </div>

  <!-- Steps -->
  <div class="grid grid-cols-1 gap-12 sm:grid-cols-2 sm:gap-x-12 sm:gap-y-16 lg:grid-cols-4 lg:gap-8">
    @for (s of steps; track s.n) {
      <div class="custom-step" appReveal>
        <span class="font-serif italic text-[3rem] opacity-40 block mb-4">{{ s.n }}</span>
        <h3 class="font-serif font-normal text-[1.5rem] m-0 mb-3 md:text-[1.75rem]">{{ s.t }}</h3>
        <p class="text-[0.95rem] leading-[1.6] opacity-75 m-0">{{ s.d }}</p>
      </div>
    }
  </div>

</section>
